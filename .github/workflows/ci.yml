name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Lint, Test, Build
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder?sslmode=disable"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_placeholder_for_ci_build_only"
      CLERK_SECRET_KEY: "sk_test_placeholder_for_ci_build_only"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
