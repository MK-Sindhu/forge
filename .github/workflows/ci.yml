name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Lint, Test, Build
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder?sslmode=disable"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_placeholder_for_ci_build_only"
      CLERK_SECRET_KEY: "sk_test_placeholder_for_ci_build_only"
      # R2 placeholders — needed at build time because src/lib/r2.ts
      # throws at module load when these are missing, and the upload-sign
      # route imports it during static page-data collection.
      R2_ACCOUNT_ID: "placeholder_r2_account_for_ci"
      R2_ACCESS_KEY_ID: "placeholder_r2_access_key_for_ci"
      R2_SECRET_ACCESS_KEY: "placeholder_r2_secret_for_ci"
      R2_BUCKET_GLB: "forge-glb"
      R2_BUCKET_MEDIA: "forge-media"
      R2_PUBLIC_URL_GLB: "https://placeholder.r2.dev"
      R2_PUBLIC_URL_MEDIA: "https://placeholder.r2.dev"
      # Plausible — empty string means no analytics script renders in CI builds
      NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
